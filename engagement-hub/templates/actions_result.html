<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Result | Action Tracker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="result-page">
<div class="topbar"><div class="topbar-inner"><span class="product-logo">KPMG</span><span class="brand-name">Engagement Hub</span><span class="tag">Action Tracker</span></div></div>
<div class="wrap viewer-wrap">
  <div class="result-heading">
    <div><h1>Tracker, email, and slide ready.</h1><p class="sub">{{ count }} action item{{ 's' if count != 1 else '' }} included. Review all three outputs below.</p></div>
    <div class="actions result-actions">
      <a class="btn" href="/actions/download/{{ sid }}/xlsx">Download tracker</a>
      <a class="btn secondary" href="/actions/download/{{ sid }}/pptx">Download slide</a>
      <a class="btn secondary" href="/actions/download/{{ sid }}/email">Download email</a>
      <a class="btn secondary" href="/">Start over</a>
    </div>
  </div>
  {% include '_artifact_previews.html' %}
</div>
</body>
</html>
