<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Result | Model Auditor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="result-page">
<div class="topbar"><div class="topbar-inner"><span class="product-logo">KPMG</span><span class="brand-name">Model Auditor</span><span class="tag">Internal demo</span></div></div>
<div class="wrap viewer-wrap">
  <div class="result-heading">
    <div><h1>Report and annotated workbook ready.</h1><p class="sub">Review every report slide and every workbook sheet before downloading.</p></div>
    <div class="actions result-actions"><a class="btn" href="/download/{{ sid }}/report">Download report</a><a class="btn secondary" href="/download/{{ sid }}/annotated">Download workbook</a><a class="btn secondary" href="/">Start over</a></div>
  </div>
  <div class="grade-circle {{ 'grade-good' if stats.health_score >= 80 else ('grade-warn' if stats.health_score >= 50 else 'grade-bad') }}"><div class="letter">{{ grade }}</div><div class="score">{{ stats.health_score }}/100</div></div>
  {% include '_artifact_previews.html' %}
</div>
</body>
</html>
